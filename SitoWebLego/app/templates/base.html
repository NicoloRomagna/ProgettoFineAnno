<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lego World</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(155, 46, 46, 0.137);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.4rem;
        }

        .red_button {
            width: 70%;
            padding: 12px;
            background: linear-gradient(135deg, #fb6363 0%, #bd0404 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .green_button {
            width: 70%;
            padding: 12px;
            background: linear-gradient(135deg, #95f185 0%, #025716 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .lego-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .lego-card {
            background: #f2f2f2;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            color: black;
            transition: 0.2s;
        }

        .lego-card img {
            width: 100%;
            border-radius: 8px;
        }

        .lego-card p {
            margin-top: 10px;
            font-weight: bold;
        }

        .lego-card:hover {
            transform: scale(1.05);
            background: #e6e6e6;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-light" style="background-color:#f3bf13;">
    <div class="container d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center gap-2">
            <img src="https://loghi-famosi.com/wp-content/uploads/2020/10/LEGO-Logo-1972-1998.png"
                 alt="LEGO Logo"
                 style="height:70px;">

            <a class="navbar-brand m-0 text-dark" href="{{ url_for('main.index') }}">
                Lego World
            </a>
        </div>

        <div class="d-flex gap-3 align-items-center">

            <a href="{{ url_for('auth.login') }}" class="btn btn-dark btn-sm">
                Login
            </a>

            <a href="{{ url_for('auth.register') }}"
               class="btn btn-sm text-white"
               style="background-color:#3b82f6; border:none;">
                Registrati
            </a>
        </div>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
