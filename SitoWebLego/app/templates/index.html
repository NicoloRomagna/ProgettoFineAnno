{% extends "base.html" %}

{% block content %}

<style>
.lego-gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-top: 30px;
    justify-items: center;
    padding: 0 20px;
}

.lego-gallery img {
    width: 100%;
    max-width: 600px;
    max-height: 400px;
    object-fit: cover;
    border-radius: 10px;
}

@media (max-width: 768px) {
    .lego-gallery {
        grid-template-columns: 1fr;
    }
}
</style>

<div style="text-align:center; margin-top:30px;">

    <h1>Benvenuto in Lego World</h1>
    <p>Scopri, colleziona e gestisci i tuoi set LEGO</p>

</div>

<div class="lego-gallery">

    <img src="https://i.redd.it/l61mtdtjusj71.jpg" alt="Lego 1">
    <img src="https://images.unsplash.com/photo-1587654780291-39c9404d746b" alt="Lego 2">
    <img src="https://immagini.trovaprezzi.it/magazine/2024/12/Lego-la-storia-1.jpg" alt="Lego 3">
    <img src="https://media.printables.com/media/prints/630574/images/4994599_66e5d32b-a0da-407b-a49a-b13ca0b3793c_407b4599-ead4-44d4-a496-2d398541bdf5/thumbs/inside/1280x960/png/led_lego_render_2023-oct-29_03-44-37pm-000_customizedview46356661205.webp" alt="Lego 4">

</div>

{% endblock %}
