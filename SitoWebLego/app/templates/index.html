{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-center mb-4">Collezione Lego</h2>

    <div class="row">
        {% for lego in legos %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100">
                
                <img src="https://source.unsplash.com/400x300/?lego,{{ lego.nome }}" 
                     class="card-img-top" alt="Lego">

                <div class="card-body">
                    <h5 class="card-title">{{ lego.nome }}</h5>
                    <p class="card-text">{{ lego.descrizione }}</p>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
